<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Escapade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/images/568_819.png">
  <link rel="stylesheet" href="css/style1.css">
  <link rel="stylesheet" href="css/reservation3.css">
  <script src="js/page-loader.js" defer></script>
  <style>
    input,
    textarea {
      font-size: 18px;
    }
    input::placeholder,
    textarea::placeholder,
    input::-webkit-input-placeholder,
    textarea::-webkit-input-placeholder,
    input:-ms-input-placeholder,
    textarea:-ms-input-placeholder,
    input::-ms-input-placeholder,
    textarea::-ms-input-placeholder,
    input::-moz-placeholder,
    textarea::-moz-placeholder {
      color: #ffffff !important;
      opacity: 1 !important;
      font-size: 20px;
      font-family: 'Big Caslon', serif;
      letter-spacing: 0.5px;
    }
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Futura Md BT', 'Futura', sans-serif;
      font-size: 14px;
      color: #1f1f1f;
    }
    .lang-switcher a {
      text-decoration: none;
      color: inherit;
      opacity: 0.65;
      transition: opacity 0.2s ease;
    }
    .lang-switcher a:hover {
      opacity: 0.85;
    }
    .lang-switcher a.lang-active {
      opacity: 1;
      text-decoration: underline;
    }
    .lang-switcher span {
      opacity: 0.4;
    }

    /* Styles pour les logos de cartes - Responsive */
    .card-logos-container {
      width: 360px;
      height: 110px;
      transition: all 0.3s ease;
    }

    .card-logo {
      width: 80px;
      height: 48px;
      padding: 6px;
      transition: all 0.3s ease;
    }

    /* Tablette */
    @media (max-width: 1024px) {
      .card-logos-container {
        width: 280px;
        height: 85px;
        gap: 6px;
      }

      .card-logo {
        width: 64px;
        height: 40px;
        padding: 4px;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .card-logos-container {
        width: 240px;
        height: 70px;
        gap: 4px;
        margin-bottom: 1rem;
      }

      .card-logo {
        width: 56px;
        height: 32px;
        padding: 3px;
      }
    }

    /* Petit mobile */
    @media (max-width: 480px) {
      .card-logos-container {
        width: 200px;
        height: 60px;
        gap: 3px;
        margin-bottom: 0.75rem;
      }

      .card-logo {
        width: 48px;
        height: 28px;
        padding: 2px;
      }
    }

    /* Réduction du border-radius pour les divs #BB996B */
    div[class*="bg-[#BB996B]"],
    .bg-\[#BB996B\] {
      border-radius: 0 140px 0 140px;
    }

    /* Tablette */
    @media (max-width: 1024px) {
      div[class*="bg-[#BB996B]"],
      .bg-\[#BB996B\] {
        border-radius: 0 100px 0 100px;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      div[class*="bg-[#BB996B]"],
      .bg-\[#BB996B\] {
        border-radius: 0 70px 0 70px;
      }
    }

    /* Petit mobile */
    @media (max-width: 480px) {
      div[class*="bg-[#BB996B]"],
      .bg-\[#BB996B\] {
        border-radius: 0 50px 0 50px;
      }
    }

    /* Suppression du scroll vertical sur le textarea */
    #message {
      overflow-y: hidden !important;
      overflow-x: hidden !important;
    }

    /* Style pour les liens cliquables de la progress bar */
    .progress-step__link {
      transition: opacity 0.2s ease;
    }
    .progress-step__link:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body data-page="reservationStep4">
<div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="" data-translate-attr="aria-label" data-translate="loading">
  <div class="loader-inner">
    <span class="loader-ring" aria-hidden="true"></span>
    <p class="loader-text" data-translate="escapadeLoader">L'ESCAPADE</p>
  </div>
</div>
  <section id="progress-bar">
    <header class="progress-header">
      <div class="progress-header__container">
        <a href="index.html" class="progress-header__logo" aria-label="Homepage">
          <img src="images/427_501.svg" alt="L'escapade Logo">
        </a>
        <nav class="progress-header__nav" aria-label="Checkout Progress">
          <ol class="progress-steps">
            <li class="progress-step is-complete">
              <a href="page_reservation1.html" class="progress-step__link" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; cursor: pointer;">
              <div class="progress-step__icon-wrapper">
                <img class="progress-step__icon" src="images/11d0ffacd4ff82d0273fcea40309ad0ecc3b1fc6.png" alt="Step 1 Completed">
              </div>
              <span class="progress-step__label" data-translate="reservationStepDate">Date</span>
              </a>
            </li>
            <li class="progress-arrow">
              <img src="images/324_439.svg" alt="Arrow" class="progress-arrow__icon">
            </li>
            <li class="progress-step is-complete">
              <a href="reservation1.html" class="progress-step__link" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; cursor: pointer;">
              <div class="progress-step__icon-wrapper">
                <img class="progress-step__icon" src="images/11d0ffacd4ff82d0273fcea40309ad0ecc3b1fc6.png" alt="Step 2 Completed">
              </div>
              <span class="progress-step__label" data-translate="reservationStepCategory">Catégorie</span>
              </a>
            </li>
            <li class="progress-arrow">
              <img src="images/324_439.svg" alt="Arrow" class="progress-arrow__icon">
            </li>
            <li class="progress-step is-complete">
              <a href="reservation3.html" class="progress-step__link" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; cursor: pointer;">
              <div class="progress-step__icon-wrapper">
                <img class="progress-step__icon" src="images/11d0ffacd4ff82d0273fcea40309ad0ecc3b1fc6.png" alt="Step 3 Completed">
              </div>
              <span class="progress-step__label" data-translate="reservationStepDetails">Details & confirmation</span>
              </a>
            </li>
            <li class="progress-arrow">
              <img src="images/324_439.svg" alt="Arrow" class="progress-arrow__icon">
            </li>
            <li class="progress-step is-active">
              <div class="progress-step__icon-wrapper">
                <img class="progress-step__icon" src="images/324_447.svg" alt="Step 4: Current Step">
              </div>
              <span class="progress-step__label" data-translate="reservationStepPayment">Paiement</span>
            </li>
          </ol>
        </nav>
      </div>
    </header>
  </section>

    <section id="paiement" class="relative py-8 px-6 md:px-16 bg-white text-black overflow-hidden">

  <!-- Section contact -->
  <div class="max-w-7xl mx-auto mb-20 mt-16">
    <h2 class="text-center text-[32px] font-[Big_Caslon] mb-8" data-translate="reservationContactTitle">Contact</h2>
    <div class="relative">
      <!-- Image décorative en haut à gauche -->
      <img src="media/510_6.svg" alt="Decorative element" class="absolute -top-12 -left-12 w-24 h-24 z-10 opacity-90" style="transform: scaleX(-1) scaleY(1);" />
      <!-- Image décorative en bas à droite -->
      <img src="media/510_8.svg" alt="Decorative element" class="absolute -bottom-12 -right-12 w-24 h-24 z-10 opacity-90" style="transform: scaleX(-1) scaleY(1);" />
      <form id="reservation-contact-form" action="/reservations/step4" method="POST" class="bg-[#BB996B] text-white p-10 md:p-16 rounded-[0_140px] space-y-10 relative" style="min-height: 450px;">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <div class="space-y-6">
          <div>
            <input id="prenom" name="first_name" type="text" required class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2" placeholder="Prénom*" data-translate="reservationFirstName" data-translate-attr="placeholder">
          </div>
          <div>
            <input id="email" name="email" type="email" required class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2" placeholder="E-mail*" data-translate="reservationEmail" data-translate-attr="placeholder">
          </div>
          <div>
            <input id="nationalite" name="nationality" type="text" class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2" placeholder="Nationalité" data-translate="reservationNationality" data-translate-attr="placeholder">
          </div>
        </div>

        <div class="space-y-6">
          <div>
            <input id="nom" name="last_name" type="text" required class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2" placeholder="Nom de famille*" data-translate="reservationLastName" data-translate-attr="placeholder">
          </div>
          <div>
            <input id="telephone" name="phone" type="tel" required class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2" placeholder="Téléphone*" data-translate="reservationPhone" data-translate-attr="placeholder">
          </div>
          <div>
            <textarea id="message" name="message" class="w-full bg-transparent border-b border-white/90 text-white placeholder:text-white placeholder:text-[20px] placeholder:opacity-100 placeholder:font-[Big_Caslon] focus:outline-none pb-2 resize-none overflow-hidden" placeholder="Message ou Demandes spéciales" data-translate="reservationMessage" data-translate-attr="placeholder" style="overflow-y: hidden;"></textarea>
          </div>
        </div>
      </div>

      <!-- Token CSRF -->
      <input type="hidden" name="_token" id="csrf-token-reservation4" value="">

      <!-- Bouton valider -->
      <div class="text-center pt-10 mt-8">
        <button type="submit" class="inline-block bg-[#B78F62] text-white font-[Futura_Md_BT] text-[19px] px-10 py-3 rounded-[20px_0px] hover:bg-[#835622] transition duration-300 cursor-pointer" data-translate="reservationNext">
          Suivant
        </button>
      </div>
      </form>
    </div>
  </div>



</section>

<!-- Bouton de retour -->
<button id="back-button" class="back-button" aria-label="Retour à la page précédente" title="Retour">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
  </svg>
</button>

<!-- Bouton scroll to top -->
<button id="scroll-to-top" class="scroll-to-top" aria-label="Retour en haut de la page" title="Haut de page">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
  </svg>
</button>

<script src="js/translations.js"></script>
<script src="js/navigation-tracker.js" defer></script>
<link rel="stylesheet" href="css/back-button.css">
<script src="js/back-button.js" defer></script>
<link rel="stylesheet" href="css/scroll-to-top.css">
<script src="js/scroll-to-top.js" defer></script>
<script src="js/csrf-token.js" defer></script>
<script src="js/reservation-step4.js" defer></script>
<link rel="stylesheet" href="css/responsive.css">
</body>
</html>
